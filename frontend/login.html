<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' http://localhost:8000 https://meetmind-backend-90u7.onrender.com;">
  <title>Login — MeetMind</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
        Meet<span>Mind</span>
      </a>
    </div>
  </header>

  <div class="auth-wrapper">
    <div class="auth-card glass-card">
      <div style="background: rgba(79, 142, 247, 0.1); border: 1px solid rgba(79, 142, 247, 0.25); color: #4F8EF7; padding: 0.75rem 1rem; border-radius: var(--radius-sm); margin-bottom: 1.5rem; font-size: 0.85rem; font-weight: 500; text-align: center;">
        🚀 <strong>Free Beta Active:</strong> All limits are disabled. Sign up or log in to get full access instantly.
      </div>

      <h2>Welcome Back</h2>
      <p class="subtitle">Enter your credentials to access your dashboard</p>

      <div id="error-alert" class="alert alert-danger"></div>
      <div id="success-alert" class="alert alert-success"></div>

      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" autocomplete="off" class="form-control" placeholder="name@domain.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="off" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          Sign In
        </button>
      </form>

      <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.9rem;">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>


    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const submitBtn = document.getElementById('submit-btn');
      const errorAlert = document.getElementById('error-alert');
      
      errorAlert.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing In...';
      
      try {
        const response = await fetch(`${API_BASE_URL}/api/v1/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.detail || 'Login failed. Please check your credentials.');
        }
        
        // Save user metadata details safely (access token cookie is HTTPOnly and set by response)
        localStorage.setItem('meetmind_user', JSON.stringify(data.user));
        
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorAlert.textContent = err.message;
        errorAlert.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });

    // Hacker console warning
    console.log(
      "%cSTOP!",
      "color: red; font-size: 30px; font-weight: bold; -webkit-text-stroke: 1px black;"
    );
    console.log(
      "%cThis is a browser feature intended for developers. Attempting to inject code or execute unauthorized actions here will trigger security logging.",
      "color: gray; font-size: 14px;"
    );
  </script>
</body>
</html>
