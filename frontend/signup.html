<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' http://localhost:8000 https://meetmind-backend-90u7.onrender.com;">
  <title>Sign Up — MeetMind</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
        Meet<span>Mind</span>
      </a>
    </div>
  </header>

  <div class="auth-wrapper">
    <div class="auth-card glass-card">
      <h2>Create Account</h2>
      <p class="subtitle">Enter details to sign up for MeetMind summarizer</p>

      <div id="error-alert" class="alert alert-danger"></div>
      <div id="success-alert" class="alert alert-success"></div>

      <form id="signup-form" autocomplete="off">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" autocomplete="off" class="form-control" placeholder="name@domain.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password (min. 8 characters)</label>
          <input type="password" id="password" autocomplete="off" class="form-control" placeholder="••••••••" minlength="8" required>
          <span style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem; display: block;">
            Must contain at least 1 uppercase letter, 1 lowercase letter, 1 number, and 1 special character.
          </span>
        </div>

        <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          Sign Up
        </button>
      </form>

      <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.9rem;">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // Redirect already authenticated users to dashboard
    async function redirectIfAuth() {
      try {
        const response = await fetchWithAuth(`${API_BASE_URL}/api/v1/auth/profile`);
        if (response.ok) {
          window.location.href = 'dashboard.html';
        }
      } catch (e) {}
    }
    redirectIfAuth();

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const submitBtn = document.getElementById('submit-btn');
      const errorAlert = document.getElementById('error-alert');
      const successAlert = document.getElementById('success-alert');
      
      errorAlert.style.display = 'none';
      successAlert.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating Account...';
      
      try {
        const response = await fetch(`${API_BASE_URL}/api/v1/auth/signup`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.detail || 'Registration failed. Try again.');
        }
        
        successAlert.textContent = 'Registration successful! Redirecting to login...';
        successAlert.style.display = 'block';
        
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
      } catch (err) {
        errorAlert.textContent = err.message;
        errorAlert.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign Up';
      }
    });
  </script>
</body>
</html>
